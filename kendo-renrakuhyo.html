<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剣道大会連絡表</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
      background: #f2f2f2;
      color: #333;
      font-size: 15px;
    }

    /* ===== LAYOUT ===== */
    #app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      color: #2e7d32;
      margin-bottom: 16px;
      border-bottom: 2px solid #4caf50;
      padding-bottom: 8px;
    }
    h2 {
      font-size: 16px;
      color: #2e7d32;
      margin-bottom: 10px;
      padding: 6px 10px;
      background: #c8e6c9;
      border-left: 4px solid #4caf50;
      border-radius: 2px;
    }
    h3 {
      font-size: 14px;
      color: #1b5e20;
      margin-bottom: 8px;
      font-weight: bold;
    }

    /* ===== INPUT AREA ===== */
    #input-area {
      background: #fff;
      border: 1px solid #a5d6a7;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .tournaments-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 900px) {
      .tournaments-grid { grid-template-columns: 1fr; }
    }
    .tournament-form {
      background: #f9fbe7;
      border: 1px solid #c5e1a5;
      border-radius: 6px;
      padding: 14px;
    }
    .tournament-form h3 {
      background: #4caf50;
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 15px;
    }

    /* ===== FORM FIELDS ===== */
    .field-group {
      margin-bottom: 10px;
      position: relative;
    }
    .field-group label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #388e3c;
      margin-bottom: 3px;
    }
    .field-group input[type="text"],
    .field-group input[type="date"],
    .field-group textarea,
    .field-group select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      background: #fff;
      color: #1b5e20;
    }
    .field-group input:focus,
    .field-group textarea:focus,
    .field-group select:focus {
      outline: none;
      border-color: #4caf50;
      box-shadow: 0 0 0 2px rgba(76,175,80,0.2);
    }
    .field-group textarea {
      resize: vertical;
      min-height: 56px;
    }

    /* ===== RED TEXT ===== */
    .red-text { color: #d32f2f !important; }
    .field-label-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
    }
    .field-label-row label { display: inline; margin-bottom: 0; }
    .btn-red-toggle {
      font-size: 11px;
      padding: 1px 7px;
      border: 1px solid #e57373;
      border-radius: 3px;
      background: #fff;
      color: #c62828;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
    }
    .btn-red-toggle.active {
      background: #d32f2f;
      color: #fff;
      border-color: #b71c1c;
    }

    /* ===== RICH EDITOR ===== */
    .rich-editor {
      width: 100%;
      min-height: 60px;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      background: #fff;
      padding: 6px 8px;
      line-height: 1.55;
      font-size: 13px;
      font-family: inherit;
      color: #1b5e20;
      white-space: pre-wrap;
      word-break: break-word;
      box-sizing: border-box;
      outline: none;
    }
    .rich-editor:focus {
      border-color: #4caf50;
      box-shadow: 0 0 0 2px rgba(76,175,80,0.2);
    }
    .color-btn-row { display: flex; gap: 4px; flex-shrink: 0; }
    .btn-apply-red {
      font-size: 11px; padding: 1px 8px;
      border: 1px solid #e57373; border-radius: 3px;
      background: #fff; color: #c62828;
      cursor: pointer; font-family: inherit;
    }
    .btn-apply-blk {
      font-size: 11px; padding: 1px 8px;
      border: 1px solid #aaa; border-radius: 3px;
      background: #fff; color: #333;
      cursor: pointer; font-family: inherit;
    }

    /* ===== CHIPS ===== */
    .chips-container {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
      min-height: 0;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 11px;
      cursor: pointer;
      color: #2e7d32;
      transition: background 0.15s;
      user-select: none;
    }
    .chip:hover { background: #c8e6c9; border-color: #66bb6a; }

    /* ===== TOGGLE ===== */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .toggle-label {
      font-size: 13px;
      font-weight: bold;
      color: #388e3c;
    }
    .toggle-btn {
      display: inline-flex;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      overflow: hidden;
      font-size: 12px;
    }
    .toggle-btn button {
      padding: 4px 12px;
      border: none;
      background: #f1f8e9;
      color: #388e3c;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: background 0.15s;
    }
    .toggle-btn button.active {
      background: #4caf50;
      color: white;
    }
    .toggle-btn button:hover:not(.active) { background: #c8e6c9; }

    /* ===== MEMBERS SECTION ===== */
    .members-section {
      background: #f1f8e9;
      border: 1px solid #c8e6c9;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .individual-members {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .member-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .member-row input {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
    }
    .btn-remove {
      background: #ef9a9a;
      border: none;
      border-radius: 3px;
      color: #b71c1c;
      cursor: pointer;
      padding: 2px 8px;
      font-size: 12px;
    }
    .btn-remove:hover { background: #e57373; }
    .btn-add {
      background: #a5d6a7;
      border: none;
      border-radius: 4px;
      color: #1b5e20;
      cursor: pointer;
      padding: 4px 12px;
      font-size: 12px;
      margin-top: 4px;
    }
    .btn-add:hover { background: #81c784; }

    /* ===== TEAMS ===== */
    .team-block {
      background: #fff;
      border: 1px solid #c8e6c9;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 8px;
    }
    .team-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .team-header input[type="text"] {
      width: 100px;
      padding: 3px 6px;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
    }
    .format-select {
      padding: 3px 6px;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      background: #f9fbe7;
    }
    .positions-grid {
      display: grid;
      gap: 4px;
    }
    .position-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .position-label {
      font-size: 12px;
      font-weight: bold;
      color: #388e3c;
      width: 32px;
      flex-shrink: 0;
      text-align: right;
    }
    .position-row input {
      flex: 1;
      padding: 3px 6px;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
    }

    /* ===== ACTION BUTTONS ===== */
    .action-bar {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 16px 0;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #388e3c; }
    .btn-secondary {
      background: #fff;
      color: #388e3c;
      border: 2px solid #4caf50;
      border-radius: 6px;
      padding: 10px 24px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #e8f5e9; }
    .btn-danger {
      background: #ef9a9a;
      color: #b71c1c;
      border: none;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-danger:hover { background: #e57373; }
    .btn-edit {
      background: #fff9c4;
      color: #f57f17;
      border: 1px solid #ffd54f;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-edit:hover { background: #fff59d; }

    /* preview-area は廃止 → スクショビューを使用 */

    /* ===== SAVED LIST ===== */
    #list-area {
      background: #fff;
      border: 1px solid #a5d6a7;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .list-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .list-controls input {
      padding: 6px 10px;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      width: 240px;
    }
    #records-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    #records-table th {
      background: #4caf50;
      color: white;
      padding: 8px 10px;
      text-align: left;
      font-size: 12px;
    }
    #records-table td {
      padding: 7px 10px;
      border-bottom: 1px solid #c8e6c9;
      vertical-align: middle;
    }
    #records-table tr:nth-child(even) td { background: #f9fbe7; }
    #records-table tr:hover td { background: #e8f5e9; }
    .no-records {
      text-align: center;
      color: #888;
      padding: 20px;
    }

    /* ===== NOTIFICATION ===== */
    #notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #4caf50;
      color: white;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 14px;
      z-index: 1000;
      display: none;
      box-shadow: 0 3px 8px rgba(0,0,0,0.25);
    }

    /* ===== PRINT（スクショビューからの印刷専用）===== */
    @media print {
      /* 通常アプリUI非表示 */
      #notification, #cand-modal-overlay { display: none !important; }
      /* スクショビューを表示 */
      #screenshot-view { display: block !important; }
      /* 操作UIは印刷対象外 */
      #scv-controls { display: none !important; }
      #scv-table { width: 100% !important; }
      .scv-trow { break-inside: avoid; }
    }
    @page { size: A4 landscape; margin: 5mm; }

    /* ===== MISC ===== */
    .edit-mode-banner {
      background: #fff9c4;
      border: 1px solid #ffd54f;
      border-radius: 4px;
      padding: 8px 14px;
      margin-bottom: 12px;
      color: #e65100;
      font-size: 13px;
      font-weight: bold;
      display: none;
    }
    .section-divider {
      border: none;
      border-top: 1px dashed #a5d6a7;
      margin: 10px 0;
    }
    .collapse-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #388e3c;
      padding: 0;
      text-decoration: underline;
    }

    /* ===== スクショ専用ビュー ===== */

    /* ── デフォルトテーマ変数（緑）── */
    #screenshot-view {
      --scv-bg:           #f1f8e9;
      --scv-card-border:  #2e7d32;
      --scv-title-bg:     #2e7d32;
      --scv-title-color:  #ffffff;
      --scv-label-bg:     #f1f8e9;
      --scv-label-color:  #1b5e20;
      --scv-border:       #cccccc;
      --scv-chip-bg:      #f1f8e9;
      --scv-chip-border:  #a5d6a7;
      --scv-chip-color:   #1b5e20;
      --scv-grp-bg:       #dcedc8;
      --scv-grp-color:    #33691e;
    }
    /* 青テーマ */
    #screenshot-view.theme-blue {
      --scv-bg:           #e3f2fd;
      --scv-card-border:  #1565c0;
      --scv-title-bg:     #1565c0;
      --scv-title-color:  #ffffff;
      --scv-label-bg:     #e3f2fd;
      --scv-label-color:  #0d47a1;
      --scv-border:       #cccccc;
      --scv-chip-bg:      #e3f2fd;
      --scv-chip-border:  #90caf9;
      --scv-chip-color:   #0d47a1;
      --scv-grp-bg:       #bbdefb;
      --scv-grp-color:    #0d47a1;
    }
    /* グレーテーマ */
    #screenshot-view.theme-gray {
      --scv-bg:           #eceff1;
      --scv-card-border:  #546e7a;
      --scv-title-bg:     #455a64;
      --scv-title-color:  #ffffff;
      --scv-label-bg:     #eceff1;
      --scv-label-color:  #37474f;
      --scv-border:       #cccccc;
      --scv-chip-bg:      #eceff1;
      --scv-chip-border:  #b0bec5;
      --scv-chip-color:   #37474f;
      --scv-grp-bg:       #cfd8dc;
      --scv-grp-color:    #263238;
    }
    /* ネイビーテーマ */
    #screenshot-view.theme-navy {
      --scv-bg:           #e8eaf6;
      --scv-card-border:  #283593;
      --scv-title-bg:     #283593;
      --scv-title-color:  #ffffff;
      --scv-label-bg:     #e8eaf6;
      --scv-label-color:  #1a237e;
      --scv-border:       #cccccc;
      --scv-chip-bg:      #e8eaf6;
      --scv-chip-border:  #9fa8da;
      --scv-chip-color:   #1a237e;
      --scv-grp-bg:       #c5cae9;
      --scv-grp-color:    #1a237e;
    }
    /* オレンジテーマ（落ち着いたアンバー）*/
    #screenshot-view.theme-orange {
      --scv-bg:           #fff8e1;
      --scv-card-border:  #c66900;
      --scv-title-bg:     #c66900;
      --scv-title-color:  #ffffff;
      --scv-label-bg:     #fff8e1;
      --scv-label-color:  #7f4200;
      --scv-border:       #cccccc;
      --scv-chip-bg:      #fff8e1;
      --scv-chip-border:  #ffc107;
      --scv-chip-color:   #7f4200;
      --scv-grp-bg:       #ffecb3;
      --scv-grp-color:    #7f4200;
    }

    /* スクショ専用ページ（通常フロー・スクロール可能）*/
    #screenshot-view {
      display: none;
      background: #ffffff;
      min-height: 100vh;
    }
    #screenshot-view.active { display: block; }

    /* テーブルエリア */
    #scv-table-wrap {
      padding: 8px 0;
    }

    /* 3列統一テーブル */
    #scv-table {
      width: 100%;
      border-left: 2px solid var(--scv-card-border);
      border-right: 2px solid var(--scv-card-border);
      border-top: 2px solid var(--scv-card-border);
      border-bottom: 2px solid var(--scv-card-border);
    }

    /* 各行 */
    .scv-trow {
      display: flex;
      border-bottom: 1px solid var(--scv-border);
    }
    .scv-trow:last-child { border-bottom: none; }

    /* ★ 試合名行: 全セルをテーマ色に */
    .scv-trow-title .scv-tcell {
      background: var(--scv-title-bg) !important;
      color: var(--scv-title-color) !important;
      font-weight: 800;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    /* セル共通 */
    .scv-tcell {
      padding: 6px 8px;
      display: flex;
      align-items: flex-start;
      border-right: 1px solid var(--scv-border);
      min-height: 32px;
      font-family: inherit;
    }
    .scv-tcell:last-child { border-right: none; }

    /* 項目ラベル列（左）*/
    .scv-tcell-label {
      background: var(--scv-label-bg);
      color: var(--scv-label-color);
      font-weight: 600;
      font-size: 12px;
      width: 54px;
      min-width: 54px;
      flex-shrink: 0;
      justify-content: center;
      text-align: center;
      line-height: 1.4;
      white-space: pre-line;
    }

    /* データ列（中央・右）*/
    .scv-tcell-data {
      background: var(--scv-label-bg);
      color: #222;
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      line-height: 1.55;
      word-break: break-all;
    }
    /* 中央揃えデータ */
    .scv-tcell-data.center {
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    /* 空欄セルの最小高さ */
    .scv-tcell-data-empty { min-height: 28px; }
    /* 備考行: 縦幅を広げる */
    .scv-trow-notes .scv-tcell { min-height: 80px; }
    /* 部分赤文字 */
    .text-red { color: #d00000; font-weight: 600; }
    .text-black { color: #222222; font-weight: 600; }

    /* ── 操作UI（ページ上部ヘッダー）── */
    #scv-controls {
      position: static;
      background: rgba(20, 20, 20, 0.88);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      flex-wrap: wrap;
    }
    .btn-scv {
      background: rgba(255,255,255,0.18);
      color: white;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-scv:hover { background: rgba(255,255,255,0.3); }

    /* テーマ選択 */
    #scv-theme-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      flex-wrap: wrap;
    }
    #scv-theme-bar-label {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      white-space: nowrap;
    }
    /* テーマ色丸ボタン */
    .btn-theme {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.25);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .btn-theme:hover  { border-color: rgba(255,255,255,0.75); transform: scale(1.1); }
    .btn-theme.active { border-color: #fff; transform: scale(1.15); box-shadow: 0 0 0 2px rgba(255,255,255,0.45); }

    /* 選手グループタイトル（団体戦チーム名 / 個人戦ラベル）*/
    .scv-grp-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--scv-label-color);
      background: var(--scv-label-bg);
      padding: 3px 8px;
      display: block;
      margin-bottom: 4px;
    }
    /* 個人戦チップ */
    .scv-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
    .scv-chip {
      background: var(--scv-chip-bg);
      border: 1px solid var(--scv-chip-border);
      border-radius: 3px;
      padding: 2px 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--scv-chip-color);
    }
    /* 団体戦 */
    .scv-team-block { margin-bottom: 6px; }
    .scv-pos-list { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
    .scv-pos-item {
      font-size: 13px;
      font-weight: 600;
      background: var(--scv-chip-bg);
      border: 1px solid var(--scv-chip-border);
      border-radius: 3px;
      padding: 2px 7px;
      white-space: nowrap;
      color: #333;
    }
    .member-role { font-size: 13px; font-weight: 600; color: #333; margin-right: 2px; }

    /* スマホ向け微調整 */
    @media (max-width: 480px) {
      .scv-tcell-label { width: 46px; min-width: 46px; font-size: 11px; }
      .scv-tcell-data  { font-size: 13px; }

    /* ===== 候補管理モーダル ===== */

      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

    <div id="cand-modal" style="background:#fff;max-width:640px;margin:40px auto;border-radius:8px;padding:24px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.25);">

      <p style="font-size:12px;color:#666;margin-bottom:16px;">各候補の「×」で個別削除、「全削除」でカテゴリごと全削除できます。</p>

      <!-- 3列テーブル（JSで生成）: 項目列 | 大会①列 | 大会②列 -->
    </div>

<div id="notification"></div>

<script>
'use strict';

/* ===================================================================
   CONSTANTS
=================================================================== */
const POSITIONS_5 = ['先鋒','次鋒','中堅','副将','大将'];
const POSITIONS_3 = ['先鋒','中堅','大将'];
const TEAM_NAMES  = ['Aチーム','Bチーム','Cチーム','Dチーム','Eチーム'];
const DB_NAME     = 'KendoDB';
const DB_STORE    = 'records';
const LS_FORM     = 'kendoFormDraft';
const LS_CAND     = 'kendoCandidates';

/* ===================================================================
   STATE
=================================================================== */
let db = null;
let editingId = null; // null = new record
// 最後にフォーカスされた選手入力欄（チップタップ時の入力先）
let lastFocusedPlayerInput = null;

// Form data model (2 tournaments)
function emptyTournament() {
  return {
    name: '',
    date: '',
    individual: { enabled: false, members: [] },
    teams: [],
    instructor: '',
    referee: '',
    venue: '',
    transport: '',
    gathering: '',
    reception: '',
    notes: '',
    gatheringRed: false,
    receptionRed: false,
    notesRed: false
  };
}

let formData = {
  tournament1: emptyTournament(),
  tournament2: emptyTournament()
};

// Candidate pools stored in localStorage
// staffCands: 指導者, 審判 pool
// playerCands: 選手名, チーム名 pool
// venueCands, transportCands, gatherCands, receptCands, notesCands, nameCands
function loadCandidates() {
  try {
    return JSON.parse(localStorage.getItem(LS_CAND)) || {};
  } catch { return {}; }
}
function saveCandidates(cands) {
  localStorage.setItem(LS_CAND, JSON.stringify(cands));
}
function addCandidate(pool, value) {
  if (!value || !value.trim()) return;
  const v = value.trim();
  let cands = loadCandidates();
  if (!cands[pool]) cands[pool] = [];
  if (!cands[pool].includes(v)) {
    cands[pool].unshift(v);
    if (cands[pool].length > 30) cands[pool] = cands[pool].slice(0, 30);
  }
  saveCandidates(cands);
}
function getCandidates(pool) {
  const cands = loadCandidates();
  return cands[pool] || [];
}

/* ===================================================================
   INDEXEDDB
=================================================================== */
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(DB_STORE)) {
        const store = d.createObjectStore(DB_STORE, { keyPath: 'id', autoIncrement: true });
        store.createIndex('savedAt', 'savedAt', { unique: false });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}
function dbSave(record) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    const store = tx.objectStore(DB_STORE);
    const req = record.id ? store.put(record) : store.add(record);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}
function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).getAll();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}
function dbGet(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(id);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}
function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    const req = tx.objectStore(DB_STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

/* ===================================================================
   FORM BUILDER
=================================================================== */
function buildForms() {
  buildTournamentForm('form-t1', 'tournament1', '大会①');
  buildTournamentForm('form-t2', 'tournament2', '大会②');
}

function buildTournamentForm(containerId, tKey, label) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const t = formData[tKey];

  // Title
  const titleEl = document.createElement('h3');
  titleEl.textContent = label;
  container.appendChild(titleEl);

  // 試合名
  appendField(container, '試合名', tKey, 'name', 'text', 'name');

  // 日程
  appendDateField(container, '日程', tKey, 'date');

  // ===== MEMBER SECTION =====
  const memSec = document.createElement('div');
  memSec.className = 'members-section';
  memSec.id = `${tKey}-members-section`;

  // Individual battle
  {
    const row = document.createElement('div');
    row.className = 'toggle-row';
    const lbl = document.createElement('span');
    lbl.className = 'toggle-label';
    lbl.textContent = '個人戦:';
    const togDiv = document.createElement('div');
    togDiv.className = 'toggle-btn';
    const btnAri = document.createElement('button');
    btnAri.textContent = 'あり';
    btnAri.dataset.val = 'true';
    const btnNashi = document.createElement('button');
    btnNashi.textContent = 'なし';
    btnNashi.dataset.val = 'false';
    if (t.individual.enabled) btnAri.classList.add('active');
    else btnNashi.classList.add('active');
    btnAri.onclick  = () => { t.individual.enabled = true;  btnAri.classList.add('active'); btnNashi.classList.remove('active'); rebuildMemberArea(tKey); autoSaveDraft(); };
    btnNashi.onclick = () => { t.individual.enabled = false; btnNashi.classList.add('active'); btnAri.classList.remove('active'); rebuildMemberArea(tKey); autoSaveDraft(); };
    togDiv.appendChild(btnAri);
    togDiv.appendChild(btnNashi);
    row.appendChild(lbl);
    row.appendChild(togDiv);
    memSec.appendChild(row);
  }

  // Individual member area
  const indivArea = document.createElement('div');
  indivArea.id = `${tKey}-indiv-area`;
  memSec.appendChild(indivArea);

  const divider = document.createElement('hr');
  divider.className = 'section-divider';
  memSec.appendChild(divider);

  // Team battle
  {
    const row = document.createElement('div');
    row.className = 'toggle-row';
    const lbl = document.createElement('span');
    lbl.className = 'toggle-label';
    lbl.textContent = '団体戦:';
    const togDiv = document.createElement('div');
    togDiv.className = 'toggle-btn';
    const btnAri = document.createElement('button');
    btnAri.textContent = 'あり';
    const btnNashi = document.createElement('button');
    btnNashi.textContent = 'なし';
    const teamsEnabled = t.teams.length > 0;
    if (teamsEnabled) btnAri.classList.add('active');
    else btnNashi.classList.add('active');
    btnAri.onclick  = () => { if (t.teams.length === 0) addTeam(tKey); btnAri.classList.add('active'); btnNashi.classList.remove('active'); rebuildTeamArea(tKey); autoSaveDraft(); };
    btnNashi.onclick = () => { t.teams = []; btnNashi.classList.add('active'); btnAri.classList.remove('active'); rebuildTeamArea(tKey); autoSaveDraft(); };
    togDiv.appendChild(btnAri);
    togDiv.appendChild(btnNashi);
    row.appendChild(lbl);
    row.appendChild(togDiv);
    memSec.appendChild(row);
  }

  const teamArea = document.createElement('div');
  teamArea.id = `${tKey}-team-area`;
  memSec.appendChild(teamArea);

  container.appendChild(memSec);
  rebuildMemberArea(tKey);
  rebuildTeamArea(tKey);

  // 指導者
  appendFieldWithChips(container, '指導者', tKey, 'instructor', 'text', 'staff', 'set');
  // 審判
  appendFieldWithChips(container, '審判', tKey, 'referee', 'text', 'staff', 'set');
  // 会場
  appendFieldWithChips(container, '会場', tKey, 'venue', 'text', 'venue', 'set');
  // 移動
  appendFieldWithChips(container, '移動', tKey, 'transport', 'text', 'transport', 'set');
  // 集合・出発
  appendFieldWithChips(container, '集合・出発', tKey, 'gathering', 'richtext', 'gather', 'set');
  // 受付
  appendFieldWithChips(container, '受付', tKey, 'reception', 'richtext', 'recept', 'set');
  // 備考
  appendFieldWithChips(container, '備考欄', tKey, 'notes', 'richtext', 'notes', 'append');
}

function appendField(container, labelText, tKey, field, type, candPool) {
  const fg = document.createElement('div');
  fg.className = 'field-group';
  const lbl = document.createElement('label');
  lbl.textContent = labelText;
  fg.appendChild(lbl);
  const inp = document.createElement('input');
  inp.type = type;
  inp.value = formData[tKey][field] || '';
  inp.id = `${tKey}-${field}`;
  inp.addEventListener('input', () => { formData[tKey][field] = inp.value; updatePreview(); autoSaveDraft(); });
  inp.addEventListener('blur', () => { if (candPool) addCandidate(candPool, inp.value); });
  fg.appendChild(inp);
  container.appendChild(fg);
}

function appendDateField(container, labelText, tKey, field) {
  const fg = document.createElement('div');
  fg.className = 'field-group';
  const lbl = document.createElement('label');
  lbl.textContent = labelText;
  fg.appendChild(lbl);
  const inp = document.createElement('input');
  inp.type = 'date';
  inp.value = formData[tKey][field] || '';
  inp.id = `${tKey}-${field}`;
  inp.addEventListener('input', () => { formData[tKey][field] = inp.value; updatePreview(); autoSaveDraft(); });
  fg.appendChild(inp);
  container.appendChild(fg);
}

function appendFieldWithChips(container, labelText, tKey, field, type, candPool, chipAction, redKey) {
  const fg = document.createElement('div');
  fg.className = 'field-group';

  /* ── richtext: contenteditable + [赤][黒]ボタン ── */
  if (type === 'richtext') {
    const lblRow = document.createElement('div');
    lblRow.className = 'field-label-row';
    const lbl = document.createElement('label');
    lbl.textContent = labelText;
    lblRow.appendChild(lbl);
    const colorRow = document.createElement('span');
    colorRow.className = 'color-btn-row';
    const redBtn = document.createElement('button');
    redBtn.type = 'button';
    redBtn.className = 'btn-apply-red';
    redBtn.textContent = '赤';
    const blkBtn = document.createElement('button');
    blkBtn.type = 'button';
    blkBtn.className = 'btn-apply-blk';
    blkBtn.textContent = '黒';
    colorRow.appendChild(redBtn);
    colorRow.appendChild(blkBtn);
    lblRow.appendChild(colorRow);
    fg.appendChild(lblRow);

    const editor = document.createElement('div');
    editor.contentEditable = 'true';
    editor.className = 'rich-editor';
    editor.id = `${tKey}-${field}`;
    editor._isRichEditor = true;
    editor.innerHTML = formData[tKey][field] || '';

    editor.addEventListener('input', () => {
      formData[tKey][field] = editor.innerHTML;
      autoSaveDraft();
    });
    editor.addEventListener('blur', () => {
      addCandidate(candPool, editor.innerText);
      renderChips(chipsDiv, candPool, editor, chipAction);
    });
    editor.addEventListener('focus', () => {
      renderChips(chipsDiv, candPool, editor, chipAction);
    });

    /* mousedown で選択を保持したままボタン処理 */
    redBtn.addEventListener('mousedown', e => {
      e.preventDefault();
      applySelectionColor(editor, tKey, field, 'red');
    });
    blkBtn.addEventListener('mousedown', e => {
      e.preventDefault();
      applySelectionColor(editor, tKey, field, 'black');
    });

    fg.appendChild(editor);
    const chipsDiv = document.createElement('div');
    chipsDiv.className = 'chips-container';
    renderChips(chipsDiv, candPool, editor, chipAction);
    fg.appendChild(chipsDiv);
    container.appendChild(fg);
    return;
  }

  if (redKey) {
    const lblRow = document.createElement('div');
    lblRow.className = 'field-label-row';
    const lbl = document.createElement('label');
    lbl.textContent = labelText;
    lblRow.appendChild(lbl);
    const redBtn = document.createElement('button');
    redBtn.type = 'button';
    redBtn.className = 'btn-red-toggle' + (formData[tKey][redKey] ? ' active' : '');
    redBtn.textContent = '赤文字';
    redBtn.onclick = () => {
      formData[tKey][redKey] = !formData[tKey][redKey];
      redBtn.classList.toggle('active', formData[tKey][redKey]);
      inp.classList.toggle('red-text', formData[tKey][redKey]);
      autoSaveDraft();
    };
    lblRow.appendChild(redBtn);
    const hint = document.createElement('span');
    hint.style.cssText = 'font-size:10px;color:#999;flex-shrink:0;';
    hint.textContent = '部分赤: [red]文字[/red]';
    lblRow.appendChild(hint);
    fg.appendChild(lblRow);
  } else {
    const lbl = document.createElement('label');
    lbl.textContent = labelText;
    fg.appendChild(lbl);
  }

  let inp;
  if (type === 'textarea') {
    inp = document.createElement('textarea');
    inp.rows = 2;
  } else {
    inp = document.createElement('input');
    inp.type = 'text';
  }
  inp.value = formData[tKey][field] || '';
  if (redKey && formData[tKey][redKey]) inp.classList.add('red-text');
  inp.id = `${tKey}-${field}`;
  inp.addEventListener('input', () => { formData[tKey][field] = inp.value; updatePreview(); autoSaveDraft(); });
  inp.addEventListener('blur', () => { addCandidate(candPool, inp.value); renderChips(chipsDiv, candPool, inp, chipAction); });
  inp.addEventListener('focus', () => { renderChips(chipsDiv, candPool, inp, chipAction); });
  fg.appendChild(inp);

  const chipsDiv = document.createElement('div');
  chipsDiv.className = 'chips-container';
  renderChips(chipsDiv, candPool, inp, chipAction);
  fg.appendChild(chipsDiv);

  container.appendChild(fg);
}

function renderChips(container, pool, inputEl, action) {
  const cands = getCandidates(pool);
  container.innerHTML = '';
  cands.slice(0, 15).forEach(c => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = c;
    chip.onclick = () => {
      if (inputEl._isRichEditor) {
        const esc = c.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        if (action === 'append') {
          inputEl.innerHTML = inputEl.innerHTML ? inputEl.innerHTML + '<br>' + esc : esc;
        } else {
          inputEl.innerHTML = esc;
        }
      } else {
        if (action === 'append') {
          inputEl.value = inputEl.value ? inputEl.value + '\n' + c : c;
        } else {
          inputEl.value = c;
        }
      }
      inputEl.dispatchEvent(new Event('input'));
    };
    container.appendChild(chip);
  });
}

/* ===================================================================
   INDIVIDUAL MEMBERS
=================================================================== */
function rebuildMemberArea(tKey) {
  const area = document.getElementById(`${tKey}-indiv-area`);
  if (!area) return;
  area.innerHTML = '';
  const t = formData[tKey];
  if (!t.individual.enabled) return;

  const wrapper = document.createElement('div');
  wrapper.className = 'individual-members';
  wrapper.style.marginBottom = '4px';

  t.individual.members.forEach((m, i) => {
    wrapper.appendChild(buildMemberRow(tKey, i));
  });
  area.appendChild(wrapper);

  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add';
  addBtn.textContent = '＋ 選手追加';
  addBtn.onclick = () => {
    formData[tKey].individual.members.push('');
    rebuildMemberArea(tKey);
    autoSaveDraft();
    updatePreview();
  };
  area.appendChild(addBtn);

  // Chips for player candidates
  const chipsLbl = document.createElement('div');
  chipsLbl.style.cssText = 'font-size:11px;color:#388e3c;margin-top:4px;';
  chipsLbl.textContent = '選手候補:';
  area.appendChild(chipsLbl);
  const chipsDiv = document.createElement('div');
  chipsDiv.className = 'chips-container';
  chipsDiv.id = `${tKey}-player-chips`;
  renderPlayerChips(chipsDiv, tKey);
  area.appendChild(chipsDiv);
}

function buildMemberRow(tKey, index) {
  const row = document.createElement('div');
  row.className = 'member-row';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.placeholder = `選手${index + 1}`;
  inp.value = formData[tKey].individual.members[index] || '';
  inp.addEventListener('input', () => {
    formData[tKey].individual.members[index] = inp.value;
    updatePreview();
    autoSaveDraft();
  });
  inp.addEventListener('focus', () => { lastFocusedPlayerInput = inp; });
  inp.addEventListener('blur', () => {
    addCandidate('player', inp.value);
    const cd = document.getElementById(`${tKey}-player-chips`);
    if (cd) renderPlayerChips(cd, tKey);
  });
  const delBtn = document.createElement('button');
  delBtn.className = 'btn-remove';
  delBtn.textContent = '✕';
  delBtn.onclick = () => {
    formData[tKey].individual.members.splice(index, 1);
    rebuildMemberArea(tKey);
    updatePreview();
    autoSaveDraft();
  };
  row.appendChild(inp);
  row.appendChild(delBtn);
  return row;
}

function renderPlayerChips(container, tKey) {
  const cands = getCandidates('player');
  container.innerHTML = '';
  cands.slice(0, 15).forEach(c => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = c;
    chip.onclick = () => {
      // フォーカス中の入力欄があればそこに入れる、なければ末尾追加
      if (lastFocusedPlayerInput && document.contains(lastFocusedPlayerInput)) {
        lastFocusedPlayerInput.value = c;
        lastFocusedPlayerInput.dispatchEvent(new Event('input'));
      } else {
        formData[tKey].individual.members.push(c);
        rebuildMemberArea(tKey);
        updatePreview();
        autoSaveDraft();
      }
    };
    container.appendChild(chip);
  });
}

/* ===================================================================
   TEAM MANAGEMENT
=================================================================== */
function addTeam(tKey) {
  const t = formData[tKey];
  const idx = t.teams.length;
  const teamName = TEAM_NAMES[idx] || `チーム${idx + 1}`;
  const fmt = '5';
  const members = {};
  POSITIONS_5.forEach(p => members[p] = '');
  t.teams.push({ teamName, format: fmt, members, freeMembers: [] });
}

function rebuildTeamArea(tKey) {
  const area = document.getElementById(`${tKey}-team-area`);
  if (!area) return;
  area.innerHTML = '';
  const t = formData[tKey];
  if (t.teams.length === 0) return;

  t.teams.forEach((team, ti) => {
    area.appendChild(buildTeamBlock(tKey, ti));
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add';
  addBtn.style.marginTop = '4px';
  addBtn.textContent = '＋ チーム追加';
  addBtn.onclick = () => {
    addTeam(tKey);
    rebuildTeamArea(tKey);
    updatePreview();
    autoSaveDraft();
  };
  area.appendChild(addBtn);
}

function buildTeamBlock(tKey, ti) {
  const team = formData[tKey].teams[ti];
  const block = document.createElement('div');
  block.className = 'team-block';

  // Team header
  const header = document.createElement('div');
  header.className = 'team-header';

  const nameInp = document.createElement('input');
  nameInp.type = 'text';
  nameInp.value = team.teamName;
  nameInp.placeholder = 'チーム名';
  nameInp.style.cssText = 'width:110px;padding:3px 6px;border:1px solid #a5d6a7;border-radius:4px;font-size:13px;font-family:inherit;';
  nameInp.addEventListener('input', () => {
    formData[tKey].teams[ti].teamName = nameInp.value;
    updatePreview();
    autoSaveDraft();
  });
  nameInp.addEventListener('blur', () => { addCandidate('player', nameInp.value); });

  const fmtSel = document.createElement('select');
  fmtSel.className = 'format-select';
  [['5人制','5'],['3人制','3'],['順番なし','free']].forEach(([label, val]) => {
    const o = document.createElement('option');
    o.value = val;
    o.textContent = label;
    if (team.format === val) o.selected = true;
    fmtSel.appendChild(o);
  });
  fmtSel.addEventListener('change', () => {
    const newFmt = fmtSel.value;
    formData[tKey].teams[ti].format = newFmt;
    if (newFmt === 'free') {
      if (!formData[tKey].teams[ti].freeMembers) formData[tKey].teams[ti].freeMembers = [];
    } else {
      const positions = newFmt === '5' ? POSITIONS_5 : POSITIONS_3;
      const newMembers = {};
      positions.forEach(p => newMembers[p] = (formData[tKey].teams[ti].members || {})[p] || '');
      formData[tKey].teams[ti].members = newMembers;
    }
    rebuildTeamArea(tKey);
    updatePreview();
    autoSaveDraft();
  });

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-remove';
  delBtn.textContent = '✕ 削除';
  delBtn.onclick = () => {
    formData[tKey].teams.splice(ti, 1);
    if (formData[tKey].teams.length === 0) {
      // Reset toggle buttons
      const area = document.getElementById(`${tKey}-members-section`);
      if (area) {
        const btns = area.querySelectorAll('.toggle-btn');
        if (btns.length > 1) {
          btns[1].querySelectorAll('button')[0].classList.remove('active');
          btns[1].querySelectorAll('button')[1].classList.add('active');
        }
      }
    }
    rebuildTeamArea(tKey);
    updatePreview();
    autoSaveDraft();
  };

  header.appendChild(nameInp);
  header.appendChild(fmtSel);
  header.appendChild(delBtn);
  block.appendChild(header);

  // Positions / Free members
  if (team.format === 'free') {
    // 順番なし: 自由メンバーリスト
    if (!team.freeMembers) team.freeMembers = [];
    const freeArea = document.createElement('div');
    freeArea.className = 'individual-members';
    const freeLbl = document.createElement('div');
    freeLbl.style.cssText = 'font-size:12px;color:#555;margin-bottom:4px;';
    freeLbl.textContent = '団体戦メンバー';
    freeArea.appendChild(freeLbl);
    const renderFreeRows = () => {
      const existing = freeArea.querySelectorAll('.member-row');
      existing.forEach(r => r.remove());
      (formData[tKey].teams[ti].freeMembers || []).forEach((val, idx) => {
        const row = document.createElement('div');
        row.className = 'member-row';
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.value = val;
        inp.placeholder = `メンバー${idx + 1}`;
        inp.addEventListener('focus', () => { lastFocusedPlayerInput = inp; });
        inp.addEventListener('input', () => {
          formData[tKey].teams[ti].freeMembers[idx] = inp.value;
          updatePreview();
          autoSaveDraft();
        });
        inp.addEventListener('blur', () => { addCandidate('player', inp.value); });
        const rmBtn = document.createElement('button');
        rmBtn.className = 'btn-remove';
        rmBtn.textContent = '✕';
        rmBtn.onclick = () => {
          formData[tKey].teams[ti].freeMembers.splice(idx, 1);
          renderFreeRows();
          updatePreview();
          autoSaveDraft();
        };
        row.appendChild(inp);
        row.appendChild(rmBtn);
        freeArea.insertBefore(row, addFreeBtn);
      });
    };
    const addFreeBtn = document.createElement('button');
    addFreeBtn.className = 'btn-add';
    addFreeBtn.textContent = '＋ メンバー追加';
    addFreeBtn.onclick = () => {
      formData[tKey].teams[ti].freeMembers.push('');
      renderFreeRows();
      updatePreview();
      autoSaveDraft();
    };
    freeArea.appendChild(addFreeBtn);
    renderFreeRows();
    block.appendChild(freeArea);
  } else {
    const positions = team.format === '5' ? POSITIONS_5 : POSITIONS_3;
    const grid = document.createElement('div');
    grid.className = 'positions-grid';
    positions.forEach(pos => {
      const pr = document.createElement('div');
      pr.className = 'position-row';
      const lbl = document.createElement('span');
      lbl.className = 'position-label';
      lbl.textContent = pos;
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = pos;
      inp.value = (team.members || {})[pos] || '';
      inp.addEventListener('focus', () => { lastFocusedPlayerInput = inp; });
      inp.addEventListener('input', () => {
        formData[tKey].teams[ti].members[pos] = inp.value;
        updatePreview();
        autoSaveDraft();
      });
      inp.addEventListener('blur', () => { addCandidate('player', inp.value); });
      pr.appendChild(lbl);
      pr.appendChild(inp);
      grid.appendChild(pr);
    });
    block.appendChild(grid);
  }

  // Player chips for positions
  const chipsLbl = document.createElement('div');
  chipsLbl.style.cssText = 'font-size:11px;color:#388e3c;margin-top:4px;';
  chipsLbl.textContent = '選手候補:';
  block.appendChild(chipsLbl);
  const chipsDiv = document.createElement('div');
  chipsDiv.className = 'chips-container';
  const cands = getCandidates('player');
  cands.slice(0, 12).forEach(c => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = c;
    // フォーカス中の欄に入れる。なければ次の空きポジションに入れる
    chip.onmousedown = (e) => e.preventDefault(); // フォーカスを奪わない
    chip.onclick = () => {
      if (lastFocusedPlayerInput && document.contains(lastFocusedPlayerInput)) {
        lastFocusedPlayerInput.value = c;
        lastFocusedPlayerInput.dispatchEvent(new Event('input'));
      } else {
        // フォールバック: 次の空きポジションに入れる
        const pList = formData[tKey].teams[ti].format === '5' ? POSITIONS_5 : POSITIONS_3;
        for (const p of pList) {
          if (!formData[tKey].teams[ti].members[p]) {
            formData[tKey].teams[ti].members[p] = c;
            rebuildTeamArea(tKey);
            updatePreview();
            autoSaveDraft();
            return;
          }
        }
      }
    };
    chipsDiv.appendChild(chip);
  });
  block.appendChild(chipsDiv);

  return block;
}

/* ── テーマ定義 ── */
const SCV_THEMES = [
  { id: 'green',  label: '緑',  color: '#2e7d32' },
  { id: 'blue',   label: '青',  color: '#1565c0' },
  { id: 'gray',   label: '灰',  color: '#455a64' },
  { id: 'navy',   label: '紺',  color: '#283593' },
  { id: 'orange', label: '橙',  color: '#c66900' },
];
let currentScvTheme = 'green';

/* テーマ適用 */
function applyScvTheme(themeId) {
  const view = document.getElementById('screenshot-view');
  SCV_THEMES.forEach(t => view.classList.remove('theme-' + t.id));
  if (themeId !== 'green') view.classList.add('theme-' + themeId);
  currentScvTheme = themeId;
  // アクティブボタン更新
  document.querySelectorAll('.btn-theme').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === themeId);
  });
}

/* テーマバーにボタンを生成 */
function buildThemeBar() {
  const bar = document.getElementById('scv-theme-bar');
  bar.querySelectorAll('.btn-theme').forEach(b => b.remove());
  SCV_THEMES.forEach(theme => {
    const btn = document.createElement('button');
    btn.className = 'btn-theme';
    btn.dataset.theme = theme.id;
    btn.title = theme.label;
    btn.style.background = theme.color;
    if (theme.id === currentScvTheme) btn.classList.add('active');
    btn.onclick = () => applyScvTheme(theme.id);
    bar.appendChild(btn);
  });
}

/* IndexedDBからレコードを取得してスクショ画面を開く */
async function openScreenshotView(id) {
  try {
    const record = await dbGet(id);
    if (!record) { showNotification('データが見つかりません', true); return; }
    buildThemeBar();
    applyScvTheme(currentScvTheme);
    buildScvContent(record);
    document.getElementById('app').style.display = 'none';
    document.getElementById('screenshot-view').classList.add('active');
    window.scrollTo(0, 0);
  } catch (e) {
    showNotification('読み込みエラー: ' + e.message, true);
  }
}

function closeScreenshotView() {
  document.getElementById('screenshot-view').classList.remove('active');
  document.getElementById('app').style.display = '';
  window.scrollTo(0, 0);
}

/* 3列統一テーブル（項目 | 大会① | 大会②）を生成 */
function buildScvContent(record) {
  const tbl = document.getElementById('scv-table');
  tbl.innerHTML = '';
  const t1 = record.tournament1 || {};
  const t2 = record.tournament2 || {};

  /* ── 試合名行（テーマ色・全セル）── */
  tbl.appendChild(buildScvTrow(
    '試合名',
    makeScvText(t1.name || '', true),
    makeScvText(t2.name || '', true),
    true  /* isTitle */
  ));

  /* ── 日程行 ── */
  tbl.appendChild(buildScvTrow(
    '日程',
    makeScvText(t1.date ? formatDate(t1.date) : ''),
    makeScvText(t2.date ? formatDate(t2.date) : ''),
    false, true /* center */
  ));

  /* ── 選手行 ── */
  tbl.appendChild(buildScvTrow(
    '選手',
    buildScvMembersEl(t1),
    buildScvMembersEl(t2),
    false
  ));

  /* ── その他行（全行常に表示、未入力は空欄）── */
  const rows = [
    { label: '指導者', v1: t1.instructor, v2: t2.instructor, center: true },
    { label: '審判',   v1: t1.referee,    v2: t2.referee,    center: true },
    { label: '会場',   v1: t1.venue,      v2: t2.venue,      center: true },
    { label: '移動',   v1: t1.transport,  v2: t2.transport,  center: true },
    { label: '集合\n出発', v1: t1.gathering, v2: t2.gathering, center: false, isHtml: true },
    { label: '受付',   v1: t1.reception,  v2: t2.reception,  center: false, isHtml: true },
  ];
  rows.forEach(({ label, v1, v2, center, r1, r2, isHtml }) => {
    const el1 = isHtml ? makeScvHtml(v1 || '') : makeScvText(v1 || '', false, r1);
    const el2 = isHtml ? makeScvHtml(v2 || '') : makeScvText(v2 || '', false, r2);
    tbl.appendChild(buildScvTrow(label, el1, el2, false, center));
  });

  /* ── 備考行（縦幅大きめ）── */
  const notesRow = buildScvTrow('備考', makeScvHtml(t1.notes || ''), makeScvHtml(t2.notes || ''), false, false);
  notesRow.classList.add('scv-trow-notes');
  tbl.appendChild(notesRow);
}

/* 1行（ラベルセル + データセル×2）を生成 */
function buildScvTrow(labelText, el1, el2, isTitle, center) {
  const row = document.createElement('div');
  row.className = 'scv-trow' + (isTitle ? ' scv-trow-title' : '');

  const lbl = document.createElement('div');
  lbl.className = 'scv-tcell scv-tcell-label';
  lbl.textContent = labelText;

  const d1 = document.createElement('div');
  d1.className = 'scv-tcell scv-tcell-data' + (center ? ' center' : '');
  d1.appendChild(el1);

  const d2 = document.createElement('div');
  d2.className = 'scv-tcell scv-tcell-data' + (center ? ' center' : '');
  d2.appendChild(el2);

  row.appendChild(lbl);
  row.appendChild(d1);
  row.appendChild(d2);
  return row;
}

/* ── 選択範囲の文字色を赤／黒に切り替える ── */
function applySelectionColor(editor, tKey, field, color) {
  editor.focus();
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  if (!editor.contains(range.commonAncestorContainer)) return;

  const frag = range.extractContents();

  if (color === 'red') {
    const span = document.createElement('span');
    span.className = 'text-red';
    span.appendChild(frag);
    range.insertNode(span);
  } else {
    /* text-red / text-black の span を外して通常テキストに戻す */
    stripColorSpans(frag);
    range.insertNode(frag);
  }

  editor.normalize();
  formData[tKey][field] = editor.innerHTML;
  autoSaveDraft();
}

/* frag 内の color span を再帰的に外す（in-place） */
function stripColorSpans(node) {
  Array.from(node.childNodes).forEach(child => {
    if (child.nodeType === Node.ELEMENT_NODE) {
      if (child.classList.contains('text-red') || child.classList.contains('text-black')) {
        while (child.firstChild) node.insertBefore(child.firstChild, child);
        node.removeChild(child);
      } else {
        stripColorSpans(child);
      }
    }
  });
}

/* テキストをHTML安全にエスケープし [red]..[/red] を .text-red span に変換 */
function renderRedText(container, rawText) {
  const escaped = (rawText || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  const html = escaped
    .replace(/!(.*?)!/g, '<span class="text-red">$1</span>')
    .replace(/\[red\]/g, '<span class="text-red">')
    .replace(/\[\/red\]/g, '</span>');
  container.innerHTML = html;
}

/* HTML（richtext innerHTML）をそのまま描画する要素を生成 */
function makeScvHtml(html) {
  const d = document.createElement('div');
  d.style.whiteSpace = 'pre-wrap';
  d.style.width = '100%';
  d.style.fontWeight = '600';
  d.style.lineHeight = '1.55';
  if (!html || !html.trim()) {
    d.classList.add('scv-tcell-data-empty');
  } else {
    d.innerHTML = html;
  }
  return d;
}

/* テキスト要素を生成 */
function makeScvText(text, bold, isRed) {
  const d = document.createElement('div');
  d.style.whiteSpace = 'pre-wrap';
  d.style.width = '100%';
  d.style.fontWeight = bold ? '800' : '600';
  if (isRed) {
    // フィールド全体赤（トグルボタン）
    d.style.color = '#d32f2f';
    d.textContent = text || '';
  } else {
    // [red]...[/red] タグを変換（タグなし文字列もそのまま安全に表示）
    renderRedText(d, text || '');
  }
  if (!text) d.classList.add('scv-tcell-data-empty');
  return d;
}

/* 選手セル内要素を生成 */
function buildScvMembersEl(t) {
  const wrapper = document.createElement('div');
  wrapper.style.width = '100%';
  const hasIndiv = t.individual && t.individual.enabled
                   && t.individual.members && t.individual.members.some(m => m);
  const hasTeams = t.teams && t.teams.length > 0;

  if (hasIndiv) {
    const grp = document.createElement('div');
    grp.style.marginBottom = '5px';
    const gtitle = document.createElement('span');
    gtitle.className = 'scv-grp-title';
    gtitle.textContent = '個人戦';
    grp.appendChild(gtitle);
    const chips = document.createElement('div');
    chips.className = 'scv-chips';
    t.individual.members.filter(m => m).forEach(m => {
      const chip = document.createElement('span');
      chip.className = 'scv-chip';
      chip.textContent = m;
      chips.appendChild(chip);
    });
    grp.appendChild(chips);
    wrapper.appendChild(grp);
  }

  if (hasTeams) {
    t.teams.forEach(team => {
      const blk = document.createElement('div');
      blk.className = 'scv-team-block';
      const gtitle = document.createElement('span');
      gtitle.className = 'scv-grp-title';
      if (team.format === 'free') {
        gtitle.textContent = team.teamName || '団体戦';
        blk.appendChild(gtitle);
        const freeList = document.createElement('div');
        freeList.style.cssText = 'display:flex;flex-direction:column;gap:3px;margin-top:2px;';
        (team.freeMembers || []).filter(m => m).forEach(m => {
          const item = document.createElement('span');
          item.className = 'scv-chip';
          item.textContent = m;
          freeList.appendChild(item);
        });
        blk.appendChild(freeList);
      } else {
        gtitle.textContent = `${team.teamName}（${team.format}人制）`;
        blk.appendChild(gtitle);
        const posList = document.createElement('div');
        posList.className = 'scv-pos-list';
        const positions = team.format === '5' ? POSITIONS_5 : POSITIONS_3;
        positions.forEach(pos => {
          const item = document.createElement('span');
          item.className = 'scv-pos-item';
          const posLbl = document.createElement('span');
          posLbl.className = 'member-role';
          posLbl.textContent = pos;
          item.appendChild(posLbl);
          item.appendChild(document.createTextNode(team.members[pos] || '—'));
          posList.appendChild(item);
        });
        blk.appendChild(posList);
      }
      wrapper.appendChild(blk);
    });
  }

  // 何も入力がなくても空のwrapperを返す（空欄行として表示）
  return wrapper;
}

/* buildScvRow / buildScvCard は廃止（3列テーブルに移行済み）*/

/* プレビューは廃止 → スクショボタンから openScreenshotView() を呼ぶ */
function updatePreview() { /* no-op */ }

/* formatDate は openScreenshotView から使うので残す */
function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, dd] = dateStr.split('-');
  return `${y}年${parseInt(m)}月${parseInt(dd)}日`;
}

/* ダミー: 旧mob関数の残骸を削除しダミー開始 */
/* buildMobCard / buildMobRow は削除済み（スクショビューに移行） */

/* ===================================================================
   AUTO SAVE / RESTORE DRAFT
=================================================================== */
function autoSaveDraft() {
  if (editingId !== null) return; // Don't overwrite draft when editing
  try {
    localStorage.setItem(LS_FORM, JSON.stringify(formData));
  } catch (e) {}
}

function restoreDraft() {
  try {
    const saved = localStorage.getItem(LS_FORM);
    if (saved) {
      const parsed = JSON.parse(saved);
      formData.tournament1 = Object.assign(emptyTournament(), parsed.tournament1 || {});
      formData.tournament2 = Object.assign(emptyTournament(), parsed.tournament2 || {});
    }
  } catch (e) {}
}

/* ===================================================================
   SAVE / EDIT / DELETE
=================================================================== */
async function saveRecord() {
  const record = {
    savedAt: new Date().toISOString(),
    tournament1: deepCopy(formData.tournament1),
    tournament2: deepCopy(formData.tournament2)
  };

  // Remember candidates
  rememberCandidatesFromForm();

  if (editingId !== null) {
    record.id = editingId;
  }

  try {
    await dbSave(record);
    showNotification(editingId !== null ? '更新しました ✓' : '保存しました ✓');
    editingId = null;
    document.getElementById('edit-banner').style.display = 'none';
    localStorage.removeItem(LS_FORM);
    formData = { tournament1: emptyTournament(), tournament2: emptyTournament() };
    buildForms();
    updatePreview();
    renderList();
  } catch (e) {
    showNotification('保存エラー: ' + e.message, true);
  }
}

function rememberCandidatesFromForm() {
  [formData.tournament1, formData.tournament2].forEach(t => {
    addCandidate('name',      t.name);
    addCandidate('staff',     t.instructor);
    addCandidate('staff',     t.referee);
    addCandidate('venue',     t.venue);
    addCandidate('transport', t.transport);
    addCandidate('gather',    t.gathering);
    addCandidate('recept',    t.reception);
    addCandidate('notes',     t.notes);
    if (t.individual && t.individual.members) {
      t.individual.members.forEach(m => addCandidate('player', m));
    }
    if (t.teams) {
      t.teams.forEach(team => {
        addCandidate('player', team.teamName);
        if (team.format === 'free') {
          (team.freeMembers || []).forEach(m => addCandidate('player', m));
        } else {
          Object.values(team.members).forEach(m => addCandidate('player', m));
        }
      });
    }
  });
}

async function loadForEdit(id) {
  try {
    const record = await dbGet(id);
    if (!record) return;
    formData.tournament1 = Object.assign(emptyTournament(), record.tournament1 || {});
    formData.tournament2 = Object.assign(emptyTournament(), record.tournament2 || {});
    editingId = id;
    document.getElementById('edit-banner').style.display = 'block';
    document.getElementById('edit-id-display').textContent = id;
    buildForms();
    updatePreview();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    showNotification('編集モードで読み込みました');
  } catch (e) {
    showNotification('読み込みエラー: ' + e.message, true);
  }
}

async function deleteRecord(id) {
  if (!confirm(`ID:${id} のデータを削除しますか？`)) return;
  try {
    await dbDelete(id);
    showNotification('削除しました');
    renderList();
  } catch (e) {
    showNotification('削除エラー: ' + e.message, true);
  }
}

function cancelEdit() {
  editingId = null;
  document.getElementById('edit-banner').style.display = 'none';
  formData = { tournament1: emptyTournament(), tournament2: emptyTournament() };
  localStorage.removeItem(LS_FORM);
  buildForms();
  updatePreview();
}

/* ===================================================================
   LIST
=================================================================== */
async function renderList() {
  try {
    const records = await dbGetAll();
    const query = (document.getElementById('search-input').value || '').toLowerCase();
    const tbody = document.getElementById('records-tbody');
    tbody.innerHTML = '';

    let filtered = records;
    if (query) {
      filtered = records.filter(r => {
        const n1 = (r.tournament1?.name || '').toLowerCase();
        const n2 = (r.tournament2?.name || '').toLowerCase();
        return n1.includes(query) || n2.includes(query);
      });
    }

    if (filtered.length === 0) {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.colSpan = 4;
      td.className = 'no-records';
      td.textContent = 'データがありません';
      tr.appendChild(td);
      tbody.appendChild(tr);
      return;
    }

    // Sort newest first
    filtered.sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''));

    filtered.forEach(record => {
      const tr = document.createElement('tr');

      const tdDate = document.createElement('td');
      tdDate.textContent = formatSavedAt(record.savedAt);
      tr.appendChild(tdDate);

      const tdN1 = document.createElement('td');
      tdN1.textContent = record.tournament1?.name || '(未設定)';
      tr.appendChild(tdN1);

      const tdN2 = document.createElement('td');
      tdN2.textContent = record.tournament2?.name || '(未設定)';
      tr.appendChild(tdN2);

      const tdOps = document.createElement('td');
      tdOps.style.whiteSpace = 'nowrap';

      const editBtn = document.createElement('button');
      editBtn.className = 'btn-edit';
      editBtn.textContent = '✏ 編集';
      editBtn.onclick = () => loadForEdit(record.id);

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-danger';
      delBtn.textContent = '🗑 削除';
      delBtn.style.marginLeft = '6px';
      delBtn.onclick = () => deleteRecord(record.id);

      // スクショボタン（メイン機能）
      const scvBtn = document.createElement('button');
      scvBtn.style.cssText = 'margin-left:6px;background:#388e3c;color:white;border:none;border-radius:4px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit;';
      scvBtn.textContent = '📷 スクショ';
      scvBtn.onclick = () => openScreenshotView(record.id);

      tdOps.appendChild(editBtn);
      tdOps.appendChild(delBtn);
      tdOps.appendChild(scvBtn);
      tr.appendChild(tdOps);

      tbody.appendChild(tr);
    });
  } catch (e) {
    console.error('List render error:', e);
  }
}

function formatSavedAt(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } catch { return isoStr; }
}

/* ===================================================================
   UTILITIES
=================================================================== */
function deepCopy(obj) {
  return JSON.parse(JSON.stringify(obj));
}

function showNotification(msg, isError = false) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.style.background = isError ? '#ef5350' : '#4caf50';
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 2500);
}

/* ===================================================================
   候補記憶管理モーダル
=================================================================== */
// カテゴリ定義: { key, label }
const CAND_CATEGORIES = [
  { key: 'player', label: '選手候補（個人戦・団体戦）' },
  { key: 'staff',  label: '指導者 / 審判候補' },
  { key: 'venue',  label: '会場候補' },
  { key: 'transport', label: '移動候補' },
  { key: 'gather', label: '集合出発候補' },
  { key: 'recept', label: '受付候補' },
  { key: 'notes',  label: '備考候補' },
  { key: 'name',   label: '試合名候補' },
];

function openCandManager() {
  renderCandManager();
  document.getElementById('cand-modal-overlay').style.display = 'block';
}

function closeCandManager() {
  document.getElementById('cand-modal-overlay').style.display = 'none';
}

// モーダル外クリックで閉じる
document.addEventListener('click', (e) => {
  const overlay = document.getElementById('cand-modal-overlay');
  if (e.target === overlay) closeCandManager();
});

function renderCandManager() {
  const body = document.getElementById('cand-manager-body');
  body.innerHTML = '';
  const cands = loadCandidates();

  CAND_CATEGORIES.forEach(({ key, label }) => {
    const items = cands[key] || [];
    const sec = document.createElement('div');
    sec.className = 'cand-section';

    // ヘッダー
    const hdr = document.createElement('div');
    hdr.className = 'cand-section-header';
    const ttl = document.createElement('span');
    ttl.className = 'cand-section-title';
    ttl.textContent = `${label}（${items.length}件）`;
    const clrBtn = document.createElement('button');
    clrBtn.className = 'btn-clear-all';
    clrBtn.textContent = '全削除';
    clrBtn.onclick = () => {
      if (!confirm(`「${label}」の全候補を削除しますか？`)) return;
      const c2 = loadCandidates();
      c2[key] = [];
      saveCandidates(c2);
      renderCandManager();
      buildForms(); // チップ再描画
    };
    hdr.appendChild(ttl);
    hdr.appendChild(clrBtn);
    sec.appendChild(hdr);

    // チップ一覧
    const list = document.createElement('div');
    list.className = 'cand-chip-list';
    if (items.length === 0) {
      const empty = document.createElement('span');
      empty.className = 'cand-empty';
      empty.textContent = '（なし）';
      list.appendChild(empty);
    } else {
      items.forEach((item, idx) => {
        const chip = document.createElement('span');
        chip.className = 'cand-chip-item';
        const txt = document.createElement('span');
        txt.textContent = item;
        const delBtn = document.createElement('button');
        delBtn.className = 'cand-chip-del';
        delBtn.textContent = '×';
        delBtn.title = '削除';
        delBtn.onclick = () => {
          const c2 = loadCandidates();
          if (c2[key]) c2[key].splice(idx, 1);
          saveCandidates(c2);
          renderCandManager();
          buildForms();
        };
        chip.appendChild(txt);
        chip.appendChild(delBtn);
        list.appendChild(chip);
      });
    }
    sec.appendChild(list);
    body.appendChild(sec);
  });
}

/* ===================================================================
   INIT
=================================================================== */
async function init() {
  // Open DB
  try {
    db = await openDB();
  } catch (e) {
    console.error('IndexedDB open error:', e);
    showNotification('DBエラー: ' + e.message, true);
  }

  // Restore draft (only if not editing)
  if (editingId === null) {
    restoreDraft();
  }

  // Build forms
  buildForms();

  // Build preview
  updatePreview();

  // Load list
  renderList();
}

// Run
init();
</script>
